<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />

  <!-- PWA / iOS -->
  <link rel="manifest" href="./manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="置時計" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@200;300;400&family=Noto+Sans+JP:wght@300;400;500&display=swap"
    rel="stylesheet"
  />

  <title>置時計</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="rotator" class="rotator">
    <main class="app">
      <!-- Top: Date + Clock -->
      <section class="clock-section">
        <div id="date" class="date">--月--日(-)</div>
        <div class="clock">
          <span id="hours" class="time-digit">--</span><span id="colon" class="colon">:</span><span id="minutes" class="time-digit">--</span>
        </div>
      </section>

      <!-- Middle: Weather -->
      <section class="weather-section">
        <div id="hourly" class="hourly" aria-label="時間別天気">
          <!-- 6 cells populated by JS -->
        </div>
        <div id="daily" class="daily" aria-label="週間天気">
          <!-- 7 cells populated by JS -->
        </div>
      </section>

      <!-- Bottom: News ticker -->
      <section class="news-section" aria-label="ニュース">
        <div class="news-ticker">
          <div id="news-track" class="news-track">読み込み中…</div>
        </div>
      </section>
    </main>
  </div>

  <!-- Install / permission gate (shown only when needed) -->
  <div id="gate" class="gate hidden">
    <div class="gate-card">
      <h1>置時計</h1>
      <p id="gate-text">画面回転を有効化するには下のボタンをタップしてください。</p>
      <button id="gate-btn" class="gate-btn">許可する</button>
      <p class="gate-hint">※ ホーム画面に追加するとフルスクリーンで起動します。</p>
    </div>
  </div>

  <!-- Night dimming overlay -->
  <div id="dim" class="dim"></div>

  <!-- Fullscreen toggle (Safari ブラウザ用、PWA 起動時は自動で非表示) -->
  <button id="fs-btn" class="fs-btn hidden" aria-label="全画面表示">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M4 9V4h5"/><path d="M20 9V4h-5"/><path d="M4 15v5h5"/><path d="M20 15v5h-5"/>
    </svg>
  </button>

  <script src="./app.js"></script>
</body>
</html>
